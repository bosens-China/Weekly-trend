name: Weekly Trend Report

on:
  schedule:
    # GitHub Trending 的「本周」是滚动 7 天窗口、约每天重算一次，没有固定的每周清零时刻，
    # 所以一周里任意固定时间跑都行。这里取周一 00:00 UTC（北京时间周一 08:00），代表「过去一周」。
    - cron: "0 0 * * 1"
  workflow_dispatch: {} # 支持手动触发

permissions:
  contents: write # 需要把生成的周刊 commit 回仓库

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Generate weekly report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # 可选：自定义模型 / 代理网关
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          # 用于调 GitHub API 抓 README，提高速率限制
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python src/main.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # reports/ 是周刊与期数台账；cache/ 是视觉判定缓存，提交回仓库供下次跨周复用
          git add reports/ cache/
          if git diff --staged --quiet; then
            echo "本周无新增报告，跳过提交。"
          else
            git commit -m "docs: 自动生成 GitHub 一周热点"
            git push
          fi
