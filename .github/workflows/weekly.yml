name: Weekly Trend Report

on:
  schedule:
    # GitHub Trending 的「本周」是滚动 7 天窗口、约每天重算一次，没有固定的每周清零时刻，
    # 所以一周里任意固定时间跑都行。这里取北京时间周一 07:48 = UTC 周日 23:48（故星期字段是 0=周日）。
    # 注意：错开整点 / 0 点这类全球最拥堵时段，可显著降低 GitHub schedule 的派发延迟。
    - cron: "48 23 * * 0"
  push:
    # push 也触发，但 src/main.py 里有守卫：本 ISO 周已生成过就跳过，只在本周缺报告时补生成。
    # 机器人用 GITHUB_TOKEN 提交回仓库的 push 不会再触发新 run（GitHub 防递归机制），无需担心死循环。
    branches: [master]
  workflow_dispatch: {} # 支持手动触发

permissions:
  contents: write # 需要把生成的周刊 commit 回仓库

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Generate weekly report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # 可选：自定义模型 / 代理网关（与 KEY 一并存放在 Secrets 里）
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          # 用于调 GitHub API 抓 README，提高速率限制
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python src/main.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # reports/ 是周刊与期数台账；cache/ 是视觉判定缓存，提交回仓库供下次跨周复用；
          # README.md（往期列表）与 feed.xml（RSS）随每期自动刷新，一并提交
          git add reports/ cache/ README.md feed.xml
          if git diff --staged --quiet; then
            echo "本周无新增报告，跳过提交。"
          else
            git commit -m "docs: 自动生成 GitHub 一周热点"
            git push
          fi
